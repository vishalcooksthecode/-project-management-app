<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Project Management</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-container">
  <div class="auth-card">
    <h1 id="authTitle">Welcome back</h1>
    <p id="authSubtitle">Sign in to your account</p>
    <div id="authAlert"></div>
    <form id="authForm">
      <div id="nameField" class="form-group hidden">
        <label class="form-label">Full Name</label>
        <input type="text" id="nameInput" class="form-control" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="emailInput" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="passwordInput" class="form-control" placeholder="••••••••" required />
      </div>
      <div id="roleField" class="form-group hidden">
        <label class="form-label">Role</label>
        <select id="roleInput" class="form-control">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center">
        <span id="authBtnText">Sign In</span>
      </button>
    </form>
    <div class="auth-toggle">
      <span id="authToggleText">Don't have an account?</span>
      <a id="authToggleLink"> Sign up</a>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="app hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">Task<span>Flow</span></div>
    <nav>
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </button>
      <button class="nav-item" data-page="projects">
        <span class="nav-icon">📁</span><span>Projects</span>
      </button>
      <button class="nav-item" data-page="myTasks">
        <span class="nav-icon">✅</span><span>My Tasks</span>
      </button>
      <button class="nav-item admin-only hidden" data-page="users">
        <span class="nav-icon">👥</span><span>Users</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar" id="sidebarAvatar">?</div>
        <div class="user-details">
          <div class="user-name" id="sidebarName">User</div>
          <div class="user-role" id="sidebarRole">member</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Logout">⏻</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Dashboard -->
    <div id="dashboardPage" class="page active">
      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><span class="card-title">Tasks by Status</span></div>
          <div class="card-body" id="statusBreakdown"></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Quick Actions</span></div>
          <div class="card-body" id="quickActions"></div>
        </div>
      </div>
    </div>

    <!-- Projects -->
    <div id="projectsPage" class="page">
      <div class="page-header">
        <h1 class="page-title">Projects</h1>
        <button class="btn btn-primary admin-only hidden" onclick="openProjectModal()">+ New Project</button>
      </div>
      <div class="grid-2" id="projectsGrid"></div>
    </div>

    <!-- Project Detail -->
    <div id="projectDetailPage" class="page">
      <div class="page-header">
        <div class="flex items-center gap-2">
          <button class="btn btn-secondary btn-sm" onclick="navigate('projects')">← Back</button>
          <h1 class="page-title" id="projectDetailName"></h1>
          <span id="projectDetailStatus"></span>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm admin-only-project hidden" onclick="openMembersModal()">👥 Members</button>
          <button class="btn btn-primary btn-sm admin-only-project hidden" onclick="openTaskModal()">+ Add Task</button>
        </div>
      </div>
      <p class="text-muted mb-4" id="projectDetailDesc"></p>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('tasks')">Tasks</button>
        <button class="tab" onclick="switchTab('members')">Team Members</button>
      </div>
      <div id="tasksTab">
        <div id="taskFilters" class="flex gap-2 mb-4" style="flex-wrap:wrap">
          <select class="form-control" style="width:auto" onchange="filterTasks(this.value)">
            <option value="">All Status</option>
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <select class="form-control" style="width:auto" onchange="filterTasksByPriority(this.value)">
            <option value="">All Priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div id="tasksList"></div>
      </div>
      <div id="membersTab" class="hidden">
        <div id="membersList"></div>
      </div>
    </div>

    <!-- My Tasks -->
    <div id="myTasksPage" class="page">
      <div class="page-header"><h1 class="page-title">My Tasks</h1></div>
      <div id="myTasksList"></div>
    </div>

    <!-- Users (Admin) -->
    <div id="usersPage" class="page">
      <div class="page-header"><h1 class="page-title">All Users</h1></div>
      <div class="card">
        <div class="card-body" id="usersList"></div>
      </div>
    </div>
  </main>
</div>

<!-- Project Modal -->
<div id="projectModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="projectModalTitle">New Project</span>
      <button class="btn-icon" onclick="closeModal('projectModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="projectModalAlert"></div>
      <div class="form-group">
        <label class="form-label">Project Name</label>
        <input type="text" id="projectName" class="form-control" placeholder="My Awesome Project" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="projectDesc" class="form-control" placeholder="What is this project about?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="projectStatus" class="form-control">
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="archived">Archived</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('projectModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div id="taskModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">New Task</span>
      <button class="btn-icon" onclick="closeModal('taskModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="taskModalAlert"></div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="taskTitle" class="form-control" placeholder="Task title" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="taskDesc" class="form-control" placeholder="Task details..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="taskStatus" class="form-control">
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="taskPriority" class="form-control">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" id="taskDueDate" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Assignee</label>
          <select id="taskAssignee" class="form-control">
            <option value="">Unassigned</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('taskModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Members Modal -->
<div id="membersModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Manage Team</span>
      <button class="btn-icon" onclick="closeModal('membersModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="membersModalAlert"></div>
      <div class="form-group flex gap-2">
        <select id="addMemberSelect" class="form-control">
          <option value="">Select user to add...</option>
        </select>
        <select id="addMemberRole" class="form-control" style="width:120px">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="addMember()" style="white-space:nowrap">Add</button>
      </div>
      <div id="currentMembers"></div>
    </div>
  </div>
</div>

<!-- Task Edit Modal -->
<div id="taskEditModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Update Task Status</span>
      <button class="btn-icon" onclick="closeModal('taskEditModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="editTaskStatus" class="form-control">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('taskEditModal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateTaskStatus()">Update</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
